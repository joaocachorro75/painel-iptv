<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Unificado - RaioFlix + ServeX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .tab-active { border-bottom: 2px solid #06b6d4; color: #06b6d4; }
    .loading { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, createContext, useContext } = React;

    // Auth Context
    const AuthContext = createContext(null);

    // API Helper
    const api = {
      token: localStorage.getItem('token'),
      
      async request(method, url, data = null) {
        const options = {
          method,
          headers: {
            'Content-Type': 'application/json',
            ...(this.token ? { 'Authorization': `Bearer ${this.token}` } : {})
          }
        };
        if (data) options.body = JSON.stringify(data);
        
        const res = await fetch(url, options);
        const json = await res.json();
        
        if (!res.ok) throw new Error(json.error || 'Erro na requisição');
        return json;
      },
      
      get: (url) => api.request('GET', url),
      post: (url, data) => api.request('POST', url, data),
      put: (url, data) => api.request('PUT', url, data),
      delete: (url) => api.request('DELETE', url)
    };

    // Ícones
    const Icons = {
      TV: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2" strokeWidth="2"/><path d="M17 2l-5 5-5-5" strokeWidth="2"/></svg>,
      Wifi: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0114.08 0M8.53 16.11a6 6 0 016.95 0M12 20h.01" strokeWidth="2"/></svg>,
      Users: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" strokeWidth="2"/></svg>,
      Plus: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" strokeWidth="2"/></svg>,
      Trash: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2" strokeWidth="2"/></svg>,
      Edit: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" strokeWidth="2"/></svg>,
      Renew: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" strokeWidth="2"/></svg>,
      Refresh: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" strokeWidth="2"/></svg>,
      X: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" strokeWidth="2"/></svg>,
      Logout: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" strokeWidth="2"/></svg>,
      Dollar: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" strokeWidth="2"/></svg>,
    };

    // Modal Component
    function Modal({ isOpen, onClose, title, children, size = 'lg' }) {
      if (!isOpen) return null;
      const sizeClass = size === 'sm' ? 'max-w-md' : size === 'lg' ? 'max-w-2xl' : 'max-w-lg';
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4">
          <div className={`bg-gray-800 rounded-xl p-6 w-full ${sizeClass} max-h-[90vh] overflow-y-auto`}>
            <div className="flex items-center justify-between mb-4">
              <h2 className="text-xl font-bold">{title}</h2>
              <button onClick={onClose} className="text-gray-400 hover:text-white"><Icons.X /></button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    // Login Screen
    function LoginScreen({ onLogin }) {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        
        try {
          const res = await api.post('/api/auth/login', { username, password });
          localStorage.setItem('token', res.token);
          api.token = res.token;
          onLogin(res.user);
        } catch (err) {
          setError(err.message);
        }
        
        setLoading(false);
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="bg-gray-800 rounded-2xl p-8 w-full max-w-md">
            <div className="text-center mb-8">
              <div className="w-16 h-16 bg-gradient-to-br from-cyan-500 to-purple-600 rounded-xl flex items-center justify-center font-bold text-2xl mx-auto mb-4">
                PF
              </div>
              <h1 className="text-2xl font-bold">Painel Unificado</h1>
              <p className="text-gray-400 mt-2">RaioFlix + ServeX</p>
            </div>
            
            <form onSubmit={handleLogin} className="space-y-4">
              {error && <div className="bg-red-500/20 text-red-400 p-3 rounded-lg text-sm">{error}</div>}
              
              <div>
                <label className="block text-sm text-gray-400 mb-1">Usuário</label>
                <input 
                  type="text" 
                  value={username}
                  onChange={e => setUsername(e.target.value)}
                  className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white"
                  placeholder="Seu usuário"
                  required
                />
              </div>
              
              <div>
                <label className="block text-sm text-gray-400 mb-1">Senha</label>
                <input 
                  type="password"
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white"
                  placeholder="Sua senha"
                  required
                />
              </div>
              
              <button 
                type="submit"
                disabled={loading}
                className="w-full bg-cyan-600 hover:bg-cyan-500 disabled:bg-gray-600 rounded-lg p-3 font-medium transition"
              >
                {loading ? 'Entrando...' : 'Entrar'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // Dashboard Component
    function Dashboard({ stats, onRefresh }) {
      return (
        <div className="space-y-6">
          <div className="flex items-center justify-between">
            <h2 className="text-2xl font-bold">Dashboard</h2>
            <button onClick={onRefresh} className="p-2 bg-gray-700 rounded-lg hover:bg-gray-600">
              <Icons.Refresh />
            </button>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div className="bg-gradient-to-br from-cyan-600 to-cyan-800 rounded-xl p-4">
              <div className="text-cyan-200 text-sm">Total Clientes</div>
              <div className="text-3xl font-bold">{stats?.total?.clients || 0}</div>
            </div>
            <div className="bg-gradient-to-br from-green-600 to-green-800 rounded-xl p-4">
              <div className="text-green-200 text-sm">Ativos</div>
              <div className="text-3xl font-bold">{stats?.total?.active || 0}</div>
            </div>
            <div className="bg-gradient-to-br from-purple-600 to-purple-800 rounded-xl p-4">
              <div className="text-purple-200 text-sm">RaioFlix TV</div>
              <div className="text-3xl font-bold">{stats?.raioflix?.totalClients || 0}</div>
            </div>
            <div className="bg-gradient-to-br from-orange-600 to-orange-800 rounded-xl p-4">
              <div className="text-orange-200 text-sm">ServeX Internet</div>
              <div className="text-3xl font-bold">{stats?.servex?.totalClients || 0}</div>
            </div>
          </div>
        </div>
      );
    }

    // Users Management
    function UsersTab({ user }) {
      const [users, setUsers] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [editUser, setEditUser] = useState(null);
      const [form, setForm] = useState({ username: '', password: '', name: '', email: '', role: 'revenda', credits: 0 });
      const [editForm, setEditForm] = useState({ name: '', email: '', role: '', credits: 0 });
      const [syncStatus, setSyncStatus] = useState(null);

      const loadUsers = async () => {
        setLoading(true);
        try {
          const res = await api.get('/api/users');
          setUsers(res.data || []);
        } catch (e) {
          console.error('Erro ao carregar:', e);
        }
        setLoading(false);
      };

      useEffect(() => { loadUsers(); }, []);

      const createUser = async () => {
        try {
          setSyncStatus({ status: 'syncing', message: 'Criando usuário e sincronizando com provedores...' });
          const res = await api.post('/api/users', form);
          
          if (res.data?.providerSync) {
            const syncs = res.data.providerSync;
            const successCount = syncs.filter(s => s.success).length;
            const total = syncs.length;
            setSyncStatus({ 
              status: 'success', 
              message: `Criado com sucesso! Sincronizado em ${successCount}/${total} provedores.` 
            });
          }
          
          setShowModal(false);
          loadUsers();
          setForm({ username: '', password: '', name: '', email: '', role: 'revenda', credits: 0 });
          
          setTimeout(() => setSyncStatus(null), 5000);
        } catch (e) {
          setSyncStatus({ status: 'error', message: e.message });
        }
      };

      const deleteUser = async (id) => {
        if (!confirm('Excluir este usuário?')) return;
        try {
          await api.delete(`/api/users/${id}`);
          loadUsers();
        } catch (e) {
          console.error('Erro ao excluir:', e);
        }
      };

      const openEditUser = (u) => {
        setEditUser(u);
        setEditForm({ name: u.name || '', email: u.email || '', role: u.role, credits: u.credits || 0 });
      };

      const updateUser = async () => {
        try {
          await api.put(`/api/users/${editUser.id}`, editForm);
          setEditUser(null);
          loadUsers();
        } catch (e) {
          console.error('Erro ao atualizar:', e);
          alert('Erro ao atualizar: ' + e.message);
        }
      };

      const canCreateRole = (targetRole) => {
        const levels = { super_admin: 1, ultra_master: 2, master: 3, revenda: 4, cliente: 5 };
        const canCreate = { super_admin: ['ultra_master', 'master', 'revenda', 'cliente'], ultra_master: ['master', 'revenda', 'cliente'], master: ['revenda', 'cliente'], revenda: ['cliente'] };
        return canCreate[user.role]?.includes(targetRole) || false;
      };

      const roleLabels = {
        super_admin: 'Super Admin',
        ultra_master: 'Ultra Master',
        master: 'Master',
        revenda: 'Revenda',
        cliente: 'Cliente'
      };

      return (
        <div className="space-y-4">
          <div className="flex items-center justify-between">
            <h2 className="text-2xl font-bold">Usuários</h2>
            <div className="flex gap-2">
              <button onClick={loadUsers} className="p-2 bg-gray-700 rounded-lg hover:bg-gray-600"><Icons.Refresh /></button>
              <button onClick={() => setShowModal(true)} className="flex items-center gap-2 px-4 py-2 bg-purple-600 hover:bg-purple-500 rounded-lg"><Icons.Plus /> Novo</button>
            </div>
          </div>

          {syncStatus && (
            <div className={`p-4 rounded-lg ${syncStatus.status === 'success' ? 'bg-green-500/20 text-green-400' : syncStatus.status === 'error' ? 'bg-red-500/20 text-red-400' : 'bg-yellow-500/20 text-yellow-400'}`}>
              {syncStatus.message}
            </div>
          )}

          {loading ? (
            <div className="text-center py-8 text-gray-400">Carregando...</div>
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-gray-800">
                  <tr>
                    <th className="text-left p-3">Usuário</th>
                    <th className="text-left p-3">Nome</th>
                    <th className="text-left p-3">Nível</th>
                    <th className="text-left p-3">Créditos</th>
                    <th className="text-left p-3">Status</th>
                    <th className="text-right p-3">Ações</th>
                  </tr>
                </thead>
                <tbody>
                  {users.map(u => (
                    <tr key={u.id} className="border-b border-gray-800 hover:bg-gray-800/50">
                      <td className="p-3 font-mono">{u.username}</td>
                      <td className="p-3">{u.name || '-'}</td>
                      <td className="p-3">
                        <span className="px-2 py-1 rounded text-xs bg-purple-500/20 text-purple-400">
                          {roleLabels[u.role] || u.role}
                        </span>
                      </td>
                      <td className="p-3">
                        <span className="flex items-center gap-1"><Icons.Dollar />{u.credits || 0}</span>
                      </td>
                      <td className="p-3">
                        <span className={`px-2 py-1 rounded text-xs ${u.status === 'active' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>
                          {u.status || 'active'}
                        </span>
                      </td>
                      <td className="p-3 text-right">
                        <button onClick={() => openEditUser(u)} className="p-1 text-yellow-400 hover:text-yellow-300 mr-1"><Icons.Edit /></button>
                        {u.id !== user.id && (
                          <button onClick={() => deleteUser(u.id)} className="p-1 text-red-400 hover:text-red-300"><Icons.Trash /></button>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {users.length === 0 && <div className="text-center py-8 text-gray-400">Nenhum usuário encontrado</div>}
            </div>
          )}

          <Modal isOpen={showModal} onClose={() => setShowModal(false)} title="Novo Usuário">
            <div className="space-y-4">
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm text-gray-400 mb-1">Usuário</label>
                  <input type="text" value={form.username} onChange={e => setForm({...form, username: e.target.value})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" />
                </div>
                <div>
                  <label className="block text-sm text-gray-400 mb-1">Senha</label>
                  <input type="text" value={form.password} onChange={e => setForm({...form, password: e.target.value})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" />
                </div>
              </div>
              <div>
                <label className="block text-sm text-gray-400 mb-1">Nome</label>
                <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm text-gray-400 mb-1">Nível</label>
                  <select value={form.role} onChange={e => setForm({...form, role: e.target.value})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white">
                    {Object.entries(roleLabels).map(([key, label]) => (
                      canCreateRole(key) && <option key={key} value={key}>{label}</option>
                    ))}
                  </select>
                </div>
                <div>
                  <label className="block text-sm text-gray-400 mb-1">Créditos</label>
                  <input type="number" value={form.credits} onChange={e => setForm({...form, credits: parseFloat(e.target.value) || 0})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" />
                </div>
              </div>
              <div className="bg-gray-700/50 p-3 rounded-lg text-sm text-gray-400">
                <strong>⚡ Sincronização:</strong> Se for revenda/master, será criado automaticamente em RaioFlix + ServeX.
              </div>
              <div className="flex gap-2 pt-4">
                <button onClick={() => setShowModal(false)} className="flex-1 px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg">Cancelar</button>
                <button onClick={createUser} className="flex-1 px-4 py-2 bg-purple-600 hover:bg-purple-500 rounded-lg">Criar</button>
              </div>
            </div>
          </Modal>

          {/* Modal Editar Usuário */}
          <Modal isOpen={!!editUser} onClose={() => setEditUser(null)} title="Editar Usuário" size="sm">
            <div className="space-y-4">
              <div>
                <label className="block text-sm text-gray-400 mb-1">Nome</label>
                <input type="text" value={editForm.name} onChange={e => setEditForm({...editForm, name: e.target.value})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" />
              </div>
              <div>
                <label className="block text-sm text-gray-400 mb-1">Email</label>
                <input type="email" value={editForm.email} onChange={e => setEditForm({...editForm, email: e.target.value})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" />
              </div>
              <div>
                <label className="block text-sm text-gray-400 mb-1">Nível</label>
                <select value={editForm.role} onChange={e => setEditForm({...editForm, role: e.target.value})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white">
                  {Object.entries(roleLabels).map(([key, label]) => (
                    <option key={key} value={key}>{label}</option>
                  ))}
                </select>
              </div>
              <div>
                <label className="block text-sm text-gray-400 mb-1">Créditos</label>
                <input type="number" value={editForm.credits} onChange={e => setEditForm({...editForm, credits: parseFloat(e.target.value) || 0})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" />
              </div>
              <div className="flex gap-2 pt-4">
                <button onClick={() => setEditUser(null)} className="flex-1 px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg">Cancelar</button>
                <button onClick={updateUser} className="flex-1 px-4 py-2 bg-yellow-600 hover:bg-yellow-500 rounded-lg">Salvar</button>
              </div>
            </div>
          </Modal>
        </div>
      );
    }

    // RaioFlix Clients
    function RaioFlixClients() {
      const [clients, setClients] = useState([]);
      const [loading, setLoading] = useState(true);
      const [syncing, setSyncing] = useState(false);
      const [lastSync, setLastSync] = useState(null);
      const [showModal, setShowModal] = useState(false);
      const [renewClient, setRenewClient] = useState(null);
      const [renewDays, setRenewDays] = useState(30);
      const [expFilter, setExpFilter] = useState('all');
      const [resellerFilter, setResellerFilter] = useState('all');
      const [form, setForm] = useState({ username: '', password: '', server_id: 'BV4D3rLaqZ', package_id: 'Yen129WPEa', connections: 1 });

      const syncNow = async () => {
        setSyncing(true);
        try {
          const res = await api.post('/api/sync/now');
          if (res.success) {
            setLastSync(res.lastSync);
            console.log(`✅ Sincronizado: ${res.customers} clientes`);
          }
        } catch (e) {
          console.error('Erro ao sincronizar:', e);
        }
        setSyncing(false);
      };

      const loadClients = async () => {
        setLoading(true);
        try {
          // Carrega cache instantaneamente
          const res = await api.get('/api/raioflix/customers');
          setClients(res.data || []);
          setLastSync(res.lastSync);
          setLoading(false);
          
          // Sincroniza em background (não bloqueia)
          syncNow().then(async () => {
            const res2 = await api.get('/api/raioflix/customers');
            setClients(res2.data || []);
            setLastSync(res2.lastSync);
          });
        } catch (e) {
          console.error('Erro ao carregar:', e);
          setLoading(false);
        }
      };

      useEffect(() => { loadClients(); }, []);
      
      // Copiar configurações para cliente
      const copyConfig = (c) => {
        const config = `📺 DADOS DE ACESSO - RAIOFLIX TV
━━━━━━━━━━━━━━━━━━━━━━
👤 Usuário: ${c.username}
🔑 Senha: ${c.password || '********'}
🌐 URL: http://tv.raioflix.com:8080
📱 APK: http://tv.raioflix.com:8080/apk
━━━━━━━━━━━━━━━━━━━━━━
✅ Conexões: ${c.max_connections || 1}
📅 Expira: ${c.exp_date ? new Date(c.exp_date).toLocaleDateString('pt-BR') : 'N/A'}`;
        navigator.clipboard.writeText(config);
        alert('Configurações copiadas!');
      };

      const createClient = async () => {
        try {
          await api.post('/api/raioflix/customers', form);
          setShowModal(false);
          loadClients();
          setForm({ username: '', password: '', server_id: 'BV4D3rLaqZ', package_id: 'Yen129WPEa', connections: 1 });
        } catch (e) {
          console.error('Erro ao criar:', e);
        }
      };

      const deleteClient = async (id) => {
        if (!confirm('Excluir este cliente?')) return;
        try {
          await api.delete(`/api/raioflix/customers/${id}`);
          loadClients();
        } catch (e) {
          console.error('Erro ao excluir:', e);
        }
      };

      return (
        <div className="space-y-4">
          <div className="flex items-center justify-between">
            <div>
              <h2 className="text-2xl font-bold">RaioFlix (TV)</h2>
              {lastSync && <p className="text-xs text-gray-500">Última sync: {new Date(lastSync).toLocaleString('pt-BR')}</p>}
            </div>
            <div className="flex gap-2">
              <button onClick={loadClients} disabled={loading || syncing} className="p-2 bg-gray-700 rounded-lg hover:bg-gray-600 disabled:opacity-50">
                {syncing ? <span className="loading inline-block">⏳</span> : <Icons.Refresh />}
              </button>

        }

📅 Expira: ${c.expiration_date ? new Date(c.expiration_date).toLocaleDateString('pt-BR') : 'N/A'}`;

      const [user, setUser] = useState(null);

      const [stats, setStats] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        // Check if already logged in
        const token = localStorage.getItem('token');
        if (token) {
          api.token = token;
          api.get('/api/auth/me')
            .then(res => setUser(res.user))
            .catch(() => localStorage.removeItem('token'))
            .finally(() => setLoading(false));
        } else {
          setLoading(false);
        }
      }, []);

      const loadStats = async () => {
        try {
          const res = await api.get('/api/stats');
          setStats(res.data);
        } catch (e) {
          console.error('Erro ao carregar stats:', e);
        }
      };

      useEffect(() => {
        if (user) loadStats();
      }, [user]);

      const logout = () => {
        localStorage.removeItem('token');
        api.token = null;
        setUser(null);
      };

      if (loading) {
        return <div className="min-h-screen flex items-center justify-center"><div className="text-xl">Carregando...</div></div>;
      }

      if (!user) {
        return <LoginScreen onLogin={setUser} />;

      return (

          <header className="bg-gray-800 border-b border-gray-700 sticky top-0 z-40">

                  <span className="font-medium">{user.credits || 0}</span>

          </header>

          {/* Content */}
          <main className="max-w-7xl mx-auto px-4 py-6">
            {tab === 'dashboard' && <Dashboard stats={stats} onRefresh={loadStats} />}
            {tab === 'users' && <UsersTab user={user} />}
            {tab === 'raioflix' && <RaioFlixClients />}
            {tab === 'resellers' && <RaioFlixResellers />}
            {tab === 'servex' && <ServeXClients />}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
