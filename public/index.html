<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel IPTV - RaioFlix + ServeX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .tab-active { border-bottom: 2px solid #06b6d4; color: #06b6d4; }
    .loading { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Ícones simples
    const Icons = {
      TV: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2" strokeWidth="2"/><path d="M17 2l-5 5-5-5" strokeWidth="2"/></svg>,
      Wifi: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0114.08 0M8.53 16.11a6 6 0 016.95 0M12 20h.01" strokeWidth="2"/></svg>,
      Users: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" strokeWidth="2"/></svg>,
      Plus: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" strokeWidth="2"/></svg>,
      Trash: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2" strokeWidth="2"/></svg>,
      Refresh: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" strokeWidth="2"/></svg>,
      X: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" strokeWidth="2"/></svg>,
    };

    // Modal Component
    function Modal({ isOpen, onClose, title, children }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4">
          <div className="bg-gray-800 rounded-xl p-6 max-w-lg w-full max-h-[90vh] overflow-y-auto">
            <div className="flex items-center justify-between mb-4">
              <h2 className="text-xl font-bold">{title}</h2>
              <button onClick={onClose} className="text-gray-400 hover:text-white"><Icons.X /></button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    // Dashboard Component
    function Dashboard({ stats, onRefresh }) {
      return (
        <div className="space-y-6">
          <div className="flex items-center justify-between">
            <h2 className="text-2xl font-bold">Dashboard</h2>
            <button onClick={onRefresh} className="p-2 bg-gray-700 rounded-lg hover:bg-gray-600">
              <Icons.Refresh />
            </button>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div className="bg-gradient-to-br from-cyan-600 to-cyan-800 rounded-xl p-4">
              <div className="text-cyan-200 text-sm">Total Clientes</div>
              <div className="text-3xl font-bold">{stats?.total?.clients || 0}</div>
            </div>
            <div className="bg-gradient-to-br from-green-600 to-green-800 rounded-xl p-4">
              <div className="text-green-200 text-sm">Ativos</div>
              <div className="text-3xl font-bold">{stats?.total?.active || 0}</div>
            </div>
            <div className="bg-gradient-to-br from-purple-600 to-purple-800 rounded-xl p-4">
              <div className="text-purple-200 text-sm">RaioFlix TV</div>
              <div className="text-3xl font-bold">{stats?.raioflix?.totalClients || 0}</div>
            </div>
            <div className="bg-gradient-to-br from-orange-600 to-orange-800 rounded-xl p-4">
              <div className="text-orange-200 text-sm">ServeX Internet</div>
              <div className="text-3xl font-bold">{stats?.servex?.totalClients || 0}</div>
            </div>
          </div>

          <div className="grid md:grid-cols-2 gap-6">
            <div className="bg-gray-800 rounded-xl p-6">
              <div className="flex items-center gap-2 mb-4">
                <Icons.TV /> <span className="font-semibold">RaioFlix - TV/IPTV</span>
              </div>
              <div className="space-y-2 text-sm">
                <div className="flex justify-between"><span className="text-gray-400">Clientes:</span> <span>{stats?.raioflix?.totalClients || 0}</span></div>
                <div className="flex justify-between"><span className="text-gray-400">Ativos:</span> <span className="text-green-400">{stats?.raioflix?.activeClients || 0}</span></div>
                <div className="flex justify-between"><span className="text-gray-400">Expirados:</span> <span className="text-red-400">{stats?.raioflix?.expiredClients || 0}</span></div>
                <div className="flex justify-between"><span className="text-gray-400">Revendas:</span> <span>{stats?.raioflix?.totalResellers || 0}</span></div>
              </div>
            </div>

            <div className="bg-gray-800 rounded-xl p-6">
              <div className="flex items-center gap-2 mb-4">
                <Icons.Wifi /> <span className="font-semibold">ServeX - Internet/VPN</span>
              </div>
              <div className="space-y-2 text-sm">
                <div className="flex justify-between"><span className="text-gray-400">Clientes:</span> <span>{stats?.servex?.totalClients || 0}</span></div>
                <div className="flex justify-between"><span className="text-gray-400">Ativos:</span> <span className="text-green-400">{stats?.servex?.activeClients || 0}</span></div>
                <div className="flex justify-between"><span className="text-gray-400">Expirados:</span> <span className="text-red-400">{stats?.servex?.expiredClients || 0}</span></div>
                <div className="flex justify-between"><span className="text-gray-400">Testes:</span> <span className="text-yellow-400">{stats?.servex?.testClients || 0}</span></div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Clientes RaioFlix Component
    function RaioFlixClients() {
      const [clients, setClients] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [form, setForm] = useState({ username: '', password: '', server_id: 'BV4D3rLaqZ', package_id: 'Yen129WPEa', connections: 1 });

      const loadClients = async () => {
        setLoading(true);
        try {
          const res = await fetch('/api/raioflix/customers');
          const data = await res.json();
          setClients(data.data || []);
        } catch (e) {
          console.error('Erro ao carregar:', e);
        }
        setLoading(false);
      };

      useEffect(() => { loadClients(); }, []);

      const createClient = async () => {
        try {
          const res = await fetch('/api/raioflix/customers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(form)
          });
          if (res.ok) {
            setShowModal(false);
            loadClients();
            setForm({ username: '', password: '', server_id: 'BV4D3rLaqZ', package_id: 'Yen129WPEa', connections: 1 });
          }
        } catch (e) {
          console.error('Erro ao criar:', e);
        }
      };

      const deleteClient = async (id) => {
        if (!confirm('Excluir este cliente?')) return;
        try {
          await fetch(`/api/raioflix/customers/${id}`, { method: 'DELETE' });
          loadClients();
        } catch (e) {
          console.error('Erro ao excluir:', e);
        }
      };

      return (
        <div className="space-y-4">
          <div className="flex items-center justify-between">
            <h2 className="text-2xl font-bold">Clientes RaioFlix (TV)</h2>
            <div className="flex gap-2">
              <button onClick={loadClients} className="p-2 bg-gray-700 rounded-lg hover:bg-gray-600"><Icons.Refresh /></button>
              <button onClick={() => setShowModal(true)} className="flex items-center gap-2 px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg"><Icons.Plus /> Novo</button>
            </div>
          </div>

          {loading ? (
            <div className="text-center py-8 text-gray-400">Carregando...</div>
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-gray-800">
                  <tr>
                    <th className="text-left p-3">Usuário</th>
                    <th className="text-left p-3">Servidor</th>
                    <th className="text-left p-3">Conexões</th>
                    <th className="text-left p-3">Status</th>
                    <th className="text-left p-3">Expira</th>
                    <th className="text-right p-3">Ações</th>
                  </tr>
                </thead>
                <tbody>
                  {clients.map(client => (
                    <tr key={client.id || client._id} className="border-b border-gray-800 hover:bg-gray-800/50">
                      <td className="p-3 font-mono">{client.username}</td>
                      <td className="p-3">{client.server_name || client.server_id}</td>
                      <td className="p-3">{client.connections}</td>
                      <td className="p-3">
                        <span className={`px-2 py-1 rounded text-xs ${client.status === 'active' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>
                          {client.status || 'N/A'}
                        </span>
                      </td>
                      <td className="p-3">{client.exp_date ? new Date(client.exp_date).toLocaleDateString('pt-BR') : 'N/A'}</td>
                      <td className="p-3 text-right">
                        <button onClick={() => deleteClient(client.id || client._id)} className="p-1 text-red-400 hover:text-red-300"><Icons.Trash /></button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {clients.length === 0 && <div className="text-center py-8 text-gray-400">Nenhum cliente encontrado</div>}
            </div>
          )}

          <Modal isOpen={showModal} onClose={() => setShowModal(false)} title="Novo Cliente RaioFlix">
            <div className="space-y-4">
              <div>
                <label className="block text-sm text-gray-400 mb-1">Usuário</label>
                <input type="text" value={form.username} onChange={e => setForm({...form, username: e.target.value})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" />
              </div>
              <div>
                <label className="block text-sm text-gray-400 mb-1">Senha</label>
                <input type="text" value={form.password} onChange={e => setForm({...form, password: e.target.value})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" />
              </div>
              <div>
                <label className="block text-sm text-gray-400 mb-1">Servidor</label>
                <select value={form.server_id} onChange={e => setForm({...form, server_id: e.target.value})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white">
                  <option value="BV4D3rLaqZ">RAIO FLIX BLACK</option>
                  <option value="rlKWO3Wzo7">RAIO FLIX ULTRA</option>
                  <option value="RYAWRk1jlx">RAIOFLIX GOLD</option>
                </select>
              </div>
              <div>
                <label className="block text-sm text-gray-400 mb-1">Pacote</label>
                <select value={form.package_id} onChange={e => setForm({...form, package_id: e.target.value})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white">
                  <option value="Yen129WPEa">TESTE APLICATIVOS PARCEIROS</option>
                  <option value="BV4D3rLaqZ">TESTE COMPLETO</option>
                  <option value="ZVdWXjL3qk">TESTE ULTRA COMPLETO</option>
                  <option value="B0VDVALK3q">TESTE GRATIS C/ADULTO</option>
                </select>
              </div>
              <div>
                <label className="block text-sm text-gray-400 mb-1">Conexões</label>
                <input type="number" value={form.connections} onChange={e => setForm({...form, connections: parseInt(e.target.value)})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" min="1" max="10" />
              </div>
              <div className="flex gap-2 pt-4">
                <button onClick={() => setShowModal(false)} className="flex-1 px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg">Cancelar</button>
                <button onClick={createClient} className="flex-1 px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg">Criar</button>
              </div>
            </div>
          </Modal>
        </div>
      );
    }

    // Clientes ServeX Component
    function ServeXClients() {
      const [clients, setClients] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [form, setForm] = useState({ username: '', password: '', duration: 30, type: 'user', connection_limit: 1 });

      const loadClients = async () => {
        setLoading(true);
        try {
          const res = await fetch('/api/servex/clients');
          const data = await res.json();
          setClients(data.data || []);
        } catch (e) {
          console.error('Erro ao carregar:', e);
        }
        setLoading(false);
      };

      useEffect(() => { loadClients(); }, []);

      const createClient = async () => {
        try {
          const res = await fetch('/api/servex/clients', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(form)
          });
          if (res.ok) {
            setShowModal(false);
            loadClients();
            setForm({ username: '', password: '', duration: 30, type: 'user', connection_limit: 1 });
          }
        } catch (e) {
          console.error('Erro ao criar:', e);
        }
      };

      const deleteClient = async (id) => {
        if (!confirm('Excluir este cliente?')) return;
        try {
          await fetch(`/api/servex/clients/${id}`, { method: 'DELETE' });
          loadClients();
        } catch (e) {
          console.error('Erro ao excluir:', e);
        }
      };

      return (
        <div className="space-y-4">
          <div className="flex items-center justify-between">
            <h2 className="text-2xl font-bold">Clientes ServeX (Internet)</h2>
            <div className="flex gap-2">
              <button onClick={loadClients} className="p-2 bg-gray-700 rounded-lg hover:bg-gray-600"><Icons.Refresh /></button>
              <button onClick={() => setShowModal(true)} className="flex items-center gap-2 px-4 py-2 bg-orange-600 hover:bg-orange-500 rounded-lg"><Icons.Plus /> Novo</button>
            </div>
          </div>

          {loading ? (
            <div className="text-center py-8 text-gray-400">Carregando...</div>
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-gray-800">
                  <tr>
                    <th className="text-left p-3">Usuário</th>
                    <th className="text-left p-3">Tipo</th>
                    <th className="text-left p-3">Conexões</th>
                    <th className="text-left p-3">Status</th>
                    <th className="text-left p-3">Expira</th>
                    <th className="text-right p-3">Ações</th>
                  </tr>
                </thead>
                <tbody>
                  {clients.map(client => (
                    <tr key={client.id || client._id} className="border-b border-gray-800 hover:bg-gray-800/50">
                      <td className="p-3 font-mono">{client.username}</td>
                      <td className="p-3">
                        <span className={`px-2 py-1 rounded text-xs ${client.type === 'test' ? 'bg-yellow-500/20 text-yellow-400' : 'bg-blue-500/20 text-blue-400'}`}>
                          {client.type || 'user'}
                        </span>
                      </td>
                      <td className="p-3">{client.connection_limit}</td>
                      <td className="p-3">
                        <span className={`px-2 py-1 rounded text-xs ${client.status === 'active' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>
                          {client.status || 'N/A'}
                        </span>
                      </td>
                      <td className="p-3">{client.exp_date ? new Date(client.exp_date).toLocaleDateString('pt-BR') : 'N/A'}</td>
                      <td className="p-3 text-right">
                        <button onClick={() => deleteClient(client.id || client._id)} className="p-1 text-red-400 hover:text-red-300"><Icons.Trash /></button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {clients.length === 0 && <div className="text-center py-8 text-gray-400">Nenhum cliente encontrado</div>}
            </div>
          )}

          <Modal isOpen={showModal} onClose={() => setShowModal(false)} title="Novo Cliente ServeX">
            <div className="space-y-4">
              <div>
                <label className="block text-sm text-gray-400 mb-1">Usuário (só letras e números)</label>
                <input type="text" value={form.username} onChange={e => setForm({...form, username: e.target.value.replace(/[^a-zA-Z0-9]/g, '')})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" />
              </div>
              <div>
                <label className="block text-sm text-gray-400 mb-1">Senha (só letras e números)</label>
                <input type="text" value={form.password} onChange={e => setForm({...form, password: e.target.value.replace(/[^a-zA-Z0-9]/g, '')})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" />
              </div>
              <div>
                <label className="block text-sm text-gray-400 mb-1">Tipo</label>
                <select value={form.type} onChange={e => setForm({...form, type: e.target.value})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white">
                  <option value="user">Usuário (dias)</option>
                  <option value="test">Teste (minutos)</option>
                </select>
              </div>
              <div>
                <label className="block text-sm text-gray-400 mb-1">Duração ({form.type === 'test' ? 'minutos' : 'dias'})</label>
                <input type="number" value={form.duration} onChange={e => setForm({...form, duration: parseInt(e.target.value)})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" />
              </div>
              <div>
                <label className="block text-sm text-gray-400 mb-1">Limite de Conexões</label>
                <input type="number" value={form.connection_limit} onChange={e => setForm({...form, connection_limit: parseInt(e.target.value)})} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" min="1" max="10" />
              </div>
              <div className="flex gap-2 pt-4">
                <button onClick={() => setShowModal(false)} className="flex-1 px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg">Cancelar</button>
                <button onClick={createClient} className="flex-1 px-4 py-2 bg-orange-600 hover:bg-orange-500 rounded-lg">Criar</button>
              </div>
            </div>
          </Modal>
        </div>
      );
    }

    // Main App
    function App() {
      const [tab, setTab] = useState('dashboard');
      const [stats, setStats] = useState(null);

      const loadStats = async () => {
        try {
          const res = await fetch('/api/stats');
          const data = await res.json();
          setStats(data.data);
        } catch (e) {
          console.error('Erro ao carregar stats:', e);
        }
      };

      useEffect(() => { loadStats(); }, []);

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="bg-gray-800 border-b border-gray-700 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-gradient-to-br from-cyan-500 to-purple-600 rounded-lg flex items-center justify-center font-bold">
                  IPTV
                </div>
                <div>
                  <div className="font-bold">Painel Unificado</div>
                  <div className="text-xs text-gray-400">RaioFlix + ServeX</div>
                </div>
              </div>
            </div>

            {/* Tabs */}
            <div className="max-w-7xl mx-auto px-4 flex gap-1">
              <button onClick={() => setTab('dashboard')} className={`px-4 py-3 text-sm font-medium ${tab === 'dashboard' ? 'tab-active' : 'text-gray-400 hover:text-white'}`}>
                📊 Dashboard
              </button>
              <button onClick={() => setTab('raioflix')} className={`px-4 py-3 text-sm font-medium ${tab === 'raioflix' ? 'tab-active' : 'text-gray-400 hover:text-white'}`}>
                📺 RaioFlix TV
              </button>
              <button onClick={() => setTab('servex')} className={`px-4 py-3 text-sm font-medium ${tab === 'servex' ? 'tab-active' : 'text-gray-400 hover:text-white'}`}>
                📡 ServeX Internet
              </button>
            </div>
          </header>

          {/* Content */}
          <main className="max-w-7xl mx-auto px-4 py-6">
            {tab === 'dashboard' && <Dashboard stats={stats} onRefresh={loadStats} />}
            {tab === 'raioflix' && <RaioFlixClients />}
            {tab === 'servex' && <ServeXClients />}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
